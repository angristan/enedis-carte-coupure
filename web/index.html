<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rues touchées Enedis</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQDBuN6Wm7tZa7gM2m4z7PIRrN1mtL8="
      crossorigin=""
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-pane" aria-label="Carte des rues touchées">
        <div id="map"></div>
        <div class="topbar">
          <div class="brand">
            <span class="pulse"></span>
            <div>
              <h1>Rues touchées Enedis</h1>
              <p id="status">Chargement des données Enedis...</p>
            </div>
          </div>
          <div class="actions">
            <a
              class="icon-action github-link"
              href="https://github.com/angristan/enedis-carte-coupure"
              target="_blank"
              rel="noreferrer"
              title="Voir le repo GitHub"
              aria-label="Voir le repo GitHub"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path
                  fill="currentColor"
                  d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.21.08 1.85 1.24 1.85 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.4 11.4 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.93.43.37.81 1.1.81 2.22v3.3c0 .32.22.7.83.58A12 12 0 0 0 12 .5Z"
                />
              </svg>
            </a>
            <button id="refreshButton" type="button" title="Rafraîchir">↻</button>
          </div>
        </div>
        <div class="stats-strip" aria-live="polite">
          <div>
            <span id="streetCount">-</span>
            <small>rues</small>
          </div>
          <div>
            <span id="outageCount">-</span>
            <small>coupures</small>
          </div>
          <div>
            <span id="htaCount">-</span>
            <small>HTA</small>
          </div>
          <div>
            <span id="btCount">-</span>
            <small>BT</small>
          </div>
        </div>
        <div id="hoverLabel" class="map-hover-label" hidden></div>
      </section>

      <aside class="side-pane">
        <div class="search-block">
          <label for="searchInput">Recherche</label>
          <input id="searchInput" type="search" placeholder="Rue, arrondissement, incident" autocomplete="off" />
        </div>
        <div class="segmented" role="group" aria-label="Filtrer les coupures">
          <button class="segment active" type="button" data-filter="all">Toutes</button>
          <button class="segment" type="button" data-filter="Incident HTA">HTA</button>
          <button class="segment" type="button" data-filter="Incident BT">BT</button>
        </div>
        <dl class="legend">
          <div>
            <dt>HTA</dt>
            <dd>Incident sur le réseau moyenne tension, souvent plus large qu’une seule rue.</dd>
          </div>
          <div>
            <dt>BT</dt>
            <dd>Incident sur le réseau basse tension, plus localisé côté distribution finale.</dd>
          </div>
        </dl>
        <div class="meta-row">
          <span id="visibleCount">- rues visibles</span>
          <span id="updatedAt">-</span>
        </div>
        <div id="streetList" class="street-list" aria-label="Liste des rues touchées"></div>
      </aside>
    </main>

    <template id="streetItemTemplate">
      <button class="street-item" type="button">
        <span class="street-main">
          <strong class="street-name"></strong>
          <span class="street-detail"></span>
        </span>
        <span class="street-tags"></span>
      </button>
    </template>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
